{% extends "layout.html" %}
{% block title %}Edit Task — TaskCrusher{% endblock %}

{% block content %}
<div class="edit-page">
  <div class="edit-box">

    <a href="/" class="back-link">← Back to tasks</a>
    <h1>Edit task</h1>

    <form method="post" action="/edit/{{ task.id }}">

      <label for="title">Task title</label>
      <input id="title" name="title" type="text"
             value="{{ task.title }}" required />

      <label for="note">Notes <span class="hint">(optional)</span></label>
      <input id="note" name="note" type="text"
             value="{{ task.note if task.note else '' }}"
             placeholder="Any extra details?" />

      <label for="due">Due date <span class="hint">(optional)</span></label>
      <input id="due" name="due" type="date"
             value="{{ task.due if task.due else '' }}" />

      <div class="edit-actions">
        <a href="/" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-main">Save Changes</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}

{% extends "layout.html" %}
{% block title %}Sign Up — TaskCrusher{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-top">
      <div class="auth-emoji">✨</div>
      <h1>Create your account</h1>
      <p>Start getting things done — one task at a time.</p>
    </div>

    <form method="post" action="/register">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="pick_a_username" autocomplete="username" required />

      <label for="password">Password <span class="hint">(at least 6 characters)</span></label>
      <input id="password" name="password" type="password" placeholder="••••••" autocomplete="new-password" required />

      <label for="confirm">Confirm Password</label>
      <input id="confirm" name="confirm" type="password" placeholder="••••••" autocomplete="new-password" required />

      <button type="submit" class="btn-main">Create Account</button>
    </form>

    <p class="switch-link">
      Already have an account? <a href="/login">Log in</a>
    </p>

  </div>
</div>
{% endblock %}
